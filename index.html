<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempetoto 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
<style>
:root{
  /* USA-thema: rood-wit-blauw + goud accent */
  --navy:#0a1f47; --navy2:#14306b; --royal:#1c3f7a;
  --rood:#B22234; --rood2:#8f1a28;
  --goud:#E8B923; --goud-soft:#FCE9A6;
  --blue:#2a5298; --blue-soft:#dde6f3;
  --green:#1f8a4c; --green-soft:#d4f0de;
  --grid:#c9d2e0; --hdr:#eef2f8; --hdr-line:#aab6cc;
  --ink:#15233f; --paper:#fff;
  --yellow-soft:#FFF6D8;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:Calibri,"Segoe UI",sans-serif;color:var(--ink);background:#d6dce4;
  font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden;
}
/* titelbalk — fotobanner */
.titlebar{
  position:relative;flex:0 0 auto;height:220px;overflow:hidden;
  border-bottom:3px solid var(--goud);background:var(--navy);
}
.titlebar img.hero{width:100%;height:100%;object-fit:cover;object-position:center 40%;display:block}
.titlebar .overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;
  padding:0 22px;pointer-events:none;
}
.titlebar .meta{text-align:right;text-shadow:0 2px 6px rgba(0,0,0,.8)}
.titlebar .meta .sub{color:#fff;font-size:13px;font-weight:600;letter-spacing:.3px}
/* variant met nette tekst-overlay die het beeld afdekt */
.titlebar .titletext{
  position:absolute;left:24px;top:50%;transform:translateY(-50%);
  font-family:"Russo One",Georgia,serif;font-weight:400;font-size:44px;letter-spacing:1px;
  color:#fff;text-shadow:0 3px 12px rgba(0,0,0,.95),0 0 3px #000;pointer-events:none;z-index:2;
}
.titlebar .titletext b{color:#E8B923}
.titlebar .titletext small{display:block;font-size:14px;font-weight:600;letter-spacing:.5px;color:#eef2fa;text-shadow:0 2px 6px rgba(0,0,0,.95)}
.titlebar::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,rgba(5,12,30,.78) 0%,rgba(5,12,30,.35) 45%,rgba(5,12,30,0) 70%)}

/* formulebalk-achtige naamstrook */
.namestrip{background:#f3f3f3;border-bottom:1px solid var(--hdr-line);padding:3px 14px;font-size:12px;color:#555;flex:0 0 auto}

/* het werkblad-gebied */
.sheetwrap{flex:1 1 auto;overflow:auto;background:#fff;position:relative}
.sheet{border-collapse:collapse;background:#fff;table-layout:fixed;font-variant-numeric:tabular-nums}
.sheet td,.sheet th{border:1px solid var(--grid);padding:2px 5px;height:20px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;vertical-align:middle}

/* kolomkop-rij (A B C ...) en rij-nummers, net als Excel */
.colhead{background:var(--hdr);color:#444;text-align:center;font-weight:600;border:1px solid var(--hdr-line);font-size:11px;position:sticky;top:0;z-index:3;height:18px}
.rowhead{background:var(--hdr);color:#444;text-align:center;font-weight:600;border:1px solid var(--hdr-line);font-size:11px;position:sticky;left:0;z-index:2;width:34px;min-width:34px}
.corner{position:sticky;top:0;left:0;z-index:4;background:#dcdcdc;border:1px solid var(--hdr-line)}

/* Tempetoto-celstijlen — kleurgebruik zoals origineel */
.lbl{font-weight:700;color:var(--blue)}
.lbl-r{font-weight:600;text-align:right}
.pred{background:#bcd2ec;text-align:center;font-weight:600;color:#0a2a55;border:1px solid #7ea3d4}
.res{text-align:center;font-weight:600}
.res-box{background:#fff;text-align:center;font-weight:600;border:1px solid #b9c4d6}
.pt{text-align:center;font-weight:700;background:#3b6fb5;color:#fff;border-color:#2a5694}
.pt.good{background:#3b6fb5;color:#fff}
.pt.zero{background:#3b6fb5;color:#cdddf2}
.pt.blank{background:#fff;border:1px solid #b9c4d6}
.pt-ref{text-align:center;font-weight:600;background:#eef2f8;color:#33414f;border:1px solid #cdd6e4}
.pt-ref-hit{background:#3b6fb5;color:#fff}
.pt-ref-me{outline:2px solid var(--goud);outline-offset:-2px}
/* sectiebalk (blauw gevuld, zoals 'Groepswedstrijden' in origineel) */
.grouphdr{background:#2f6db5;color:#fff;font-weight:700;font-size:13px;letter-spacing:.3px}
/* gekleurde tekst-koppen i.p.v. balk (zoals Groep A blauw, Puntentelling rood) */
.hdr-blue{color:var(--blue);font-weight:700;font-size:13px}
.hdr-red{color:var(--rood);font-weight:700;font-size:13px}
.subhdr{font-size:11px;color:#777;text-align:center;font-weight:600}
.team{padding-left:6px}
.team-r{text-align:right;padding-right:6px}
.cblock{padding:0;border:1px solid #6f6f6f}
.cblock-r{padding:0;border:1px solid #6f6f6f}
.center{text-align:center}.right{text-align:right}
.title-cell{font-size:18px;font-weight:700;color:var(--navy)}
.yellowcell{background:var(--yellow-soft)}
.total-cell{background:#FFE14D;font-weight:700;border:2px solid #1a1a1a;text-align:center}
.pt-red{background:var(--rood);color:#fff;font-weight:700;text-align:center;border-color:var(--rood2)}
.rules{font-size:11px;color:#444;white-space:normal;line-height:1.45;overflow:visible;height:auto;text-overflow:clip}
.flag{margin-right:3px}

/* STAND-tab specifiek */
.standrank{text-align:center;font-weight:700}
.me{background:var(--yellow-soft)}
.delta-up{color:var(--green);font-weight:700;text-align:center}
.delta-down{color:var(--rood);font-weight:700;text-align:center}
.delta-zero{color:#aaa;text-align:center}

/* tabbladen onderaan, net als Excel */
.tabs{flex:0 0 auto;display:flex;background:#f3f3f3;border-top:1px solid var(--hdr-line);overflow-x:auto;align-items:stretch}
.tabs button{
  border:1px solid var(--hdr-line);border-bottom:0;background:#e4e4e4;padding:6px 16px;font:inherit;
  cursor:pointer;white-space:nowrap;color:#444;border-radius:0;margin-right:-1px;
}
.tabs button:hover{background:#eee}
.tabs button.active{background:#fff;color:var(--navy);font-weight:700;border-top:2px solid var(--darkred);position:relative;z-index:1}
.tabs .grp-marker{padding:6px 8px;color:#999;font-size:11px;display:flex;align-items:center}
@media print{.tabs,.titlebar,.namestrip{display:none}.sheetwrap{overflow:visible}}
</style>
</head>
<body>
<div class="titlebar">
  <img class="hero" src="banner.png" alt="Tempetoto 2026">
  <div class="titletext">TEMPETOTO <b>2026</b><small>WK voetbal · VS · Canada · Mexico</small></div>
</div>
<div class="namestrip" id="namestrip">Tempetoto</div>
<div class="sheetwrap"><div id="sheet"></div></div>
<div class="tabs" id="tabs"></div>

<script src="data.js"></script>
<script>

// ============================================================
//  TEMPETOTO 2026 — RENDER (read-only, Excel-look)
// ============================================================

let CURRENT = "Stand";

// ---------- SCORING ----------
function parseScore(s){
  if(!s||typeof s!=="string"||!s.includes("-")) return null;
  const [h,a]=s.split("-").map(x=>parseInt(x,10));
  if(isNaN(h)||isNaN(a)) return null;
  return [h,a];
}
function toto(h,a){return h>a?1:h<a?-1:0;}

function scoreGroup(pred,res){
  const p=parseScore(pred),r=parseScore(res);
  if(!p||!r) return 0;
  let pts=0;
  if(toto(p[0],p[1])===toto(r[0],r[1])) pts+=SCORING.group.toto;
  if(p[0]===r[0]&&p[1]===r[1]) pts+=SCORING.group.exact;
  return pts;
}
function scoreKo(pred,res,round){
  const p=parseScore(pred),r=parseScore(res);
  if(!p||!r) return 0;
  let pts=0;
  if(toto(p[0],p[1])===toto(r[0],r[1])) pts+=round.toto;
  if(p[0]===r[0]&&p[1]===r[1]) pts+=round.exact;
  return pts;
}
function teamReached(land){
  let reached=null;
  for(const r of KO_ROUNDS){
    const br=UITSLAGEN.ko.brackets[r.key]||[];
    if(br.some(d=>d.home===land||d.away===land)) reached=r.key;
  }
  if(UITSLAGEN.facts.champion===land) reached="WIN";
  return reached;
}
// Verrassing: outsider — basis per ronde x onwaarschijnlijkheidsfactor, afgerond
function surprisePtsFor(land, round){
  const b=SCORING.surprise.base[round]; if(b==null) return 0;
  return Math.round(b * surpriseFactor(land));
}
function surprisePts(land){
  const r=teamReached(land); if(r==null) return 0;
  const key = r==="WIN" ? "winner" : r;
  return surprisePtsFor(land, key);
}
// Deceptie: favoriet — basis per uitschakelronde x favoriet-factor, afgerond
function deceptionPtsFor(land, exit){
  const b=SCORING.deception.base[exit]; if(b==null) return 0;
  return Math.round(b * deceptionFactor(land));
}
function deceptionExit(land){
  const r=teamReached(land);
  if(r==null) return "groep";
  if(r==="R32"||r==="R16"||r==="KF") return r;
  return null; // HF/F/winnaar = geen deceptie
}
function deceptionPts(land){
  const ex=deceptionExit(land);
  return ex ? deceptionPtsFor(land, ex) : 0;
}

function computeScore(naam){
  const v=VOORSPELLINGEN[naam], u=UITSLAGEN;
  let group=0,advance=0,ko=0,prematch=0;

  for(const m of GROUP_MATCHES) group+=scoreGroup(v.group[m.id],u.group[m.id]);

  for(const g of Object.keys(GROUPS)){
    const pred=(v.top2[g]||[]).filter(Boolean), real=(u.advancers.top2[g]||[]);
    for(const land of pred) if(real.includes(land)) advance+=SCORING.advance.perTeam;
  }
  for(const land of (v.best3||[]).filter(Boolean))
    if((u.advancers.best3||[]).includes(land)) advance+=SCORING.advance.perTeam;

  for(const r of KO_ROUNDS){
    const preds=v.ko[r.key]||[], reals=u.ko.results[r.key]||[];
    reals.forEach((res,i)=>{ if(preds[i]!=null) ko+=scoreKo(preds[i],res,r); });
  }

  const p=v.prematch,f=u.facts;
  if(p.champion&&f.champion){
    if(p.champion===f.champion) prematch+=SCORING.champion.winner;
    else if(p.champion===f.finalist) prematch+=SCORING.champion.finalist;
  }
  if(p.surprise) prematch+=surprisePts(p.surprise);
  if(p.deception) prematch+=deceptionPts(p.deception);
  if(p.topscorer){
    const rk=f.topscorers.indexOf(p.topscorer);
    if(rk===0)prematch+=SCORING.topscorer.p1;else if(rk===1)prematch+=SCORING.topscorer.p2;else if(rk===2)prematch+=SCORING.topscorer.p3;
  }
  if(p.topscorerGoals!==""&&f.topscorerGoals!=null&&Number(p.topscorerGoals)===Number(f.topscorerGoals)) prematch+=SCORING.topscorer.exactGoals;
  if(p.totalGoals!==""&&f.totalGoals!=null){const d=Math.abs(Number(p.totalGoals)-Number(f.totalGoals));const x=SCORING.totalGoals.exact-d;if(x>0)prematch+=x;}
  for(const k of ["yellow","red"]) if(p[k]!==""&&f[k]!=null){const d=Math.abs(Number(p[k])-Number(f[k]));const x=SCORING.cards.exact-d;if(x>0)prematch+=x;}

  const voorrondes=group+advance+prematch, finalerondes=ko;
  return {group,advance,ko,prematch,voorrondes,finalerondes,totaal:voorrondes+finalerondes};
}

// ---------- SPREADSHEET BOUWER ----------
// We bouwen een grid: rijen van cellen {c:tekst, cls:class, span:n}.
// De renderer plakt er kolomletters (A,B,..) en rijnummers omheen, Excel-stijl.
const NCOLS = 20; // A..T
function colLetter(i){ let s="";i++;while(i>0){i--;s=String.fromCharCode(65+i%26)+s;i=Math.floor(i/26);}return s; }

function renderGrid(rows){
  const sheet=document.getElementById("sheet");
  const tbl=document.createElement("table");tbl.className="sheet";
  // kolombreedtes
  const colgroup=document.createElement("colgroup");
  const widths=[34, 16,80, 16,80, 44,44,28, 14, 16,80, 16,80, 44,44,28, 32,32,32,32,32];
  let totalW=0;
  for(let i=0;i<=NCOLS;i++){const w=widths[i]||32;const col=document.createElement("col");col.style.width=w+"px";colgroup.append(col);totalW+=w;}
  tbl.append(colgroup);
  tbl.style.width=totalW+"px";   // vaste totaalbreedte -> fixed layout respecteert kolombreedtes exact
  // kolomkoppen
  const head=document.createElement("tr");
  head.append(cell("","corner"));
  for(let i=0;i<NCOLS;i++) head.append(cell(colLetter(i),"colhead"));
  tbl.append(head);
  // datarijen
  rows.forEach((row,ri)=>{
    const tr=document.createElement("tr");
    tr.append(cell(String(ri+1),"rowhead"));
    let used=0;
    (row||[]).forEach(c=>{
      const td=document.createElement("td");
      td.className=c.cls||"";
      if(c.style)td.style.cssText=c.style;
      if(c.span&&c.span>1){td.colSpan=c.span;used+=c.span;}else used++;
      td.innerHTML=c.c!=null?c.c:"";
      if(c.title)td.title=c.title;
      tr.append(td);
    });
    for(;used<NCOLS;used++) tr.append(document.createElement("td"));
    tbl.append(tr);
  });
  sheet.innerHTML="";sheet.append(tbl);
}
function cell(text,cls){const e=document.createElement("th");e.className=cls;e.textContent=text;return e;}
function C(c,cls,span,title){return {c,cls,span,title};}
function blank(n){return Array.from({length:n},()=>C(""));}

// ---------- DEELNEMER-SHEET ----------
function participantRows(naam){
  const v=VOORSPELLINGEN[naam], u=UITSLAGEN, sc=computeScore(naam);
  const rows=[];
  const push=(...cells)=>rows.push(cells);
  const empty=()=>rows.push([]);

  // titel
  push(C(`Tempetoto 2026 — ${naam}`,"title-cell",6));
  empty();

  // ===== Vooraf voorspeld — nu links/bovenaan (kolommen A-G) =====
  const pre=v.prematch;
  const champPts = pre.champion&&u.facts.champion ? (pre.champion===u.facts.champion?SCORING.champion.winner:(pre.champion===u.facts.finalist?SCORING.champion.finalist:0)) : 0;
  const preRow=(label,val,pts,extra)=>{
    const r=[];
    r.push(C(label,"lbl-r",2));            // A-B label
    r.push(C(val||"","pred",2));            // C-D waarde (leeg = nog niet)
    r.push(C(extra!=null?extra:"","center")); // E extra
    r.push(C(pts!=null?String(pts):"",pts>0?"pt-red":"pt zero")); // F punten (rood zoals origineel)
    return r;
  };
  rows.push([C("Vooraf voorspeld","grouphdr",6)]);
  rows.push(preRow("Kampioen:",flagName(pre.champion),champPts));
  rows.push(preRow("Verrassing:",flagName(pre.surprise),pre.surprise?surprisePts(pre.surprise):0));
  rows.push(preRow("Deceptie:",flagName(pre.deception),pre.deception?deceptionPts(pre.deception):0));
  rows.push(preRow("Topscorer:",pre.topscorer,topscorerPts(pre),"g: "+(pre.topscorerGoals||"")));
  rows.push(preRow("Totaal goals:",pre.totalGoals||"",totalGoalsPts(pre)));
  rows.push(preRow("Gele kaarten:",pre.yellow||"",cardPts(pre,"yellow")));
  rows.push(preRow("Rode kaarten:",pre.red||"",cardPts(pre,"red")));
  empty();

  // ===== Referentietabellen: verrassing & deceptie =====
  buildSurpriseTable(v,u).forEach(r=>rows.push(r));
  empty();
  buildDeceptionTable(v,u).forEach(r=>rows.push(r));
  empty();

  // ===== Spelregels (uit de originele Tempetoto, bijgewerkt voor WK-format) =====
  push(C("Spelregels:","hdr-blue",NCOLS));
  for(const regel of SPELREGELS) push(C("• "+regel,"rules",NCOLS));
  empty();

  // ===== Puntentelling =====
  push(C("Puntentelling:","hdr-red",NCOLS));
  for(const [kop,tekst] of PUNTENTELLING){
    const r=[]; r.push(C(kop,"lbl-r",4)); r.push(C(tekst,"rules",16)); rows.push(r);
  }
  empty();

  // subtotalen
  const subRow=(label,val,cls)=>{const r=blank(15);r.push(C(label,"lbl-r",2));r.push(C("",""));r.push(C(""));r.push(C(String(val),cls||"pt"));return r;};
  empty();

  // groepswedstrijden — twee kolommen naast elkaar (links A-F, rechts G-L per paar)
  push(C("Groepswedstrijden","grouphdr",NCOLS));
  const groups=Object.keys(GROUPS);
  for(let i=0;i<groups.length;i+=2){
    const gl=groups[i], gr=groups[i+1];
    // groepkop-rij — voorsp./uitslag/pt. boven kolommen 5,6,7
    const hr=[];
    hr.push(C(`Groep ${gl}`,"hdr-blue",4));               // 1-4: groepnaam over team-kolommen
    hr.push(C("voorsp.","subhdr"));hr.push(C("uitslag","subhdr"));hr.push(C("pt.","subhdr")); // 5,6,7
    hr.push(C(""));                                        // 8: spacer
    if(gr){
      hr.push(C(`Groep ${gr}`,"hdr-blue",4));             // 9-12
      hr.push(C("voorsp.","subhdr"));hr.push(C("uitslag","subhdr"));hr.push(C("pt.","subhdr")); // 13,14,15
    }
    rows.push(hr);
    // 6 wedstrijden
    const ml=GROUP_MATCHES.filter(m=>m.group===gl);
    const mr=gr?GROUP_MATCHES.filter(m=>m.group===gr):[];
    for(let k=0;k<6;k++){
      const r=[];
      r.push(...matchCells(v,u,ml[k]));
      r.push(C(""));
      if(gr) r.push(...matchCells(v,u,mr[k]));
      rows.push(r);
    }
    // doorgaan: Groepswinnaar + Runner-up (twee regels)
    advanceRows(v,u,gl,gr).forEach(r=>rows.push(r));
  }
  empty();

  // beste nummers 3 — strakke lijst: kleurblok + land + puntvak, twee kolommen van 4
  push(C("Beste 8 nummers 3 (3 pt per goed voorspeld land)","grouphdr",NCOLS));
  const b3pred=(v.best3||[]);
  const b3real=(u.advancers.best3||[]);
  const b3line=(idx)=>{
    const land=b3pred[idx];
    const good=land&&b3real.includes(land);
    const pts = land ? (good?"3":"0") : "";
    // cblock(1) + nr/land(span4) + puntvak(span2) = lijnt punt uit op brede kolom
    return [
      cblock(land||""),
      C(land?`${idx+1}. ${flagName(land)}`:`${idx+1}.`,"team",4),
      C(pts,"pt"+(good?" good":" zero")),
    ];
  };
  for(let i=0;i<4;i++){
    const r=[...b3line(i)];        // links: 1-4  (cols 1-6)
    r.push(C(""));                 // spacer col 7
    r.push(C(""));                 // spacer col 8
    r.push(...b3line(i+4));        // rechts: 5-8 (cols 9-14)
    rows.push(r);
  }
  empty();

  // knock-out
  push(C("Knock-out (uitslag na 90 min)","grouphdr",NCOLS));
  for(const round of KO_ROUNDS){
    const br=u.ko.brackets[round.key]||[];
    if(!br.length) continue;
    push(C(`${round.naam}  ·  toto ${round.toto} / exact +${round.exact}`,"lbl",NCOLS));
    push(C(""),C(""),C("voorsp.","subhdr"),C("uitslag","subhdr"),C("pt.","subhdr"));
    br.forEach((duel,i)=>{
      const pred=(v.ko[round.key]||[])[i]||"";
      const res=(u.ko.results[round.key]||[])[i]||"";
      const pts=scoreKo(pred,res,round);
      const r=[];
      r.push(C(flagName(duel.home)+" – "+flagName(duel.away),"team",2));
      r.push(C(pred||"","pred"));r.push(C(res||"","res"));r.push(C(res?String(pts):"","pt"+(pts>0?" good":" zero")));
      rows.push(r);
    });
  }
  empty();

  // totalen onderaan
  rows.push(subRow("Punten uit voorrondes:",sc.voorrondes,"pt"));
  rows.push(subRow("Punten uit finalerondes:",sc.finalerondes,"pt"));
  rows.push(subRow("TOTAAL:",sc.totaal,"total-cell"));
  return rows;
}

function flagName(land){return land?((typeof FLAGS!=="undefined"&&FLAGS[land])?FLAGS[land]+" ":"")+land:"";}
function topscorerPts(p){const f=UITSLAGEN.facts;if(!p.topscorer)return 0;const s=SCORING.topscorer;const rk=f.topscorers.indexOf(p.topscorer);let pts=rk===0?s.p1:rk===1?s.p2:rk===2?s.p3:0;if(p.topscorerGoals!==""&&f.topscorerGoals!=null&&Number(p.topscorerGoals)===Number(f.topscorerGoals))pts+=s.exactGoals;return pts;}

// ===== Referentietabel VERRASSING (outsiders buiten top-12) =====
// rondes als oplopende kolommen; punten schalen met FIFA-ranking (onwaarschijnlijkheid)
function buildSurpriseTable(v,u){
  const cols=[["R16","R16"],["KF","KF"],["HF","HF"],["F","Finale"],["winner","Winnaar"]];
  const rows=[];
  rows.push([C("Verrassing — kies een land BUITEN de top-12 · punten lopen op met onwaarschijnlijkheid (FIFA-ranking)","grouphdr",NCOLS)]);
  const hr=[C("Outsider","subhdr",5)];
  cols.forEach(c=>hr.push(C(c[1],"subhdr",3)));
  rows.push(hr);
  const chosen=v.prematch.surprise;
  // sorteer outsiders op ranking (sterkste eerst), zodat oplopende punten zichtbaar zijn
  const outs=alleOutsiders().sort((a,b)=>(RANKING[a]||50)-(RANKING[b]||50));
  const order=["R16","KF","HF","F","winner"];
  for(const land of outs){
    const reached=teamReached(land);
    const reachedKey = reached==="WIN"?"winner":reached;
    const r=[ C((land===chosen?"➤ ":"")+flagName(land), land===chosen?"lbl":"team",5) ];
    cols.forEach(c=>{
      const pts=surprisePtsFor(land,c[0]);
      const got = reachedKey && order.indexOf(reachedKey)>=order.indexOf(c[0]);
      r.push(C(String(pts),"pt-ref"+(got?" pt-ref-hit":"")+(land===chosen?" pt-ref-me":""),3));
    });
    rows.push(r);
  }
  return rows;
}

// ===== Referentietabel DECEPTIE (favorieten = top-12) =====
// punten schalen met favoriet-status (hoger geranked = grotere deceptie)
function buildDeceptionTable(v,u){
  const cols=[["KF","Eruit in KF"],["R16","Eruit R16"],["R32","Eruit R32"],["groep","Groep eruit"]];
  const rows=[];
  rows.push([C("Deceptie — kies een land UIT de top-12 · punten lopen op met favoriet-status (FIFA-ranking)","grouphdr",NCOLS)]);
  const hr=[C("Favoriet","subhdr",8)];
  cols.forEach(c=>hr.push(C(c[1],"subhdr",3)));
  rows.push(hr);
  const chosen=v.prematch.deception;
  for(const land of FAVORIETEN){
    const ex=deceptionExit(land);
    const r=[ C((land===chosen?"➤ ":"")+flagName(land), land===chosen?"lbl":"team",8) ];
    cols.forEach(c=>{
      const pts=deceptionPtsFor(land,c[0]);
      const hit = ex===c[0];
      r.push(C(String(pts),"pt-ref"+(hit?" pt-ref-hit":"")+(land===chosen?" pt-ref-me":""),3));
    });
    rows.push(r);
  }
  return rows;
}
function totalGoalsPts(p){const f=UITSLAGEN.facts;if(p.totalGoals===""||f.totalGoals==null)return 0;const d=Math.abs(Number(p.totalGoals)-Number(f.totalGoals));return Math.max(0,SCORING.totalGoals.exact-d);}
function cardPts(p,k){const f=UITSLAGEN.facts;if(p[k]===""||f[k]==null)return 0;const d=Math.abs(Number(p[k])-Number(f[k]));return Math.max(0,SCORING.cards.exact-d);}

function matchCells(v,u,m){
  if(!m) return [C(""),C(""),C(""),C(""),C(""),C(""),C("")];
  const pred=v.group[m.id]||"", res=u.group[m.id]||"";
  const pts=scoreGroup(pred,res);
  return [
    cblock(m.home), C(m.home,"team"),
    cblock(m.away), C(m.away,"team-r"),
    C(pred||"","pred"), C(res||"","res-box"),
    C(res?String(pts):"","pt"+(res&&pts>0?" good":" zero")),
  ];
}
function cblock(land){
  const col=(typeof TEAMCOLORS!=="undefined"&&TEAMCOLORS[land])||"#cccccc";
  return {c:"",cls:"cblock",style:`background:${col};min-width:14px;padding:0`};
}
function shortFlag(land){return ((typeof FLAGS!=="undefined"&&FLAGS[land])?FLAGS[land]+" ":"")+land;}
// geeft TWEE rijen terug: Groepswinnaar + Runner-up (per groep links/rechts)
function advanceRows(v,u,gl,gr){
  const lineFor=(g,idx,label)=>{
    const pred=(v.top2[g]||[]);
    const land=pred[idx]||"";
    const real=(u.advancers.top2[g]||[]);
    const good=land&&real.includes(land);
    const pts = land ? (good?3:0) : null;
    // label over team-kolommen (1-4), landnaam in wit kader over voorsp.+uitslag (kol 5-6), pt.-cel blauw (kol 7)
    return [
      C(label,"lbl-r",4),
      C(land?flagName(land):"","res-box",2),
      C(pts!=null?String(pts):"","pt"+(good?"":" zero")),
    ];
  };
  const mk=(idx,label)=>{
    const r=[...lineFor(gl,idx,label)];
    if(gr){ r.push(C("")); r.push(...lineFor(gr,idx,label)); }
    return r;
  };
  return [ mk(0,"Groepswinnaar:"), mk(1,"Runner-up:") ];
}

// ---------- STAND-SHEET ----------
function standRows(){
  const rows=[];
  rows.push([C("Tussenstand Tempetoto 2026","title-cell",16)]);
  rows.push([]);
  // koprij — spanning op brede kolommen: #(1) naam(5) gr.fase(4) KO(3) totaal(3)
  rows.push([C("#","grouphdr",2),C("Naam","grouphdr",5),C("Groepsfase","grouphdr",4),C("KO-rondes","grouphdr",3),C("Totaal","grouphdr",3)]);
  const data=DEELNEMERS.map(n=>({naam:n,...computeScore(n)})).sort((a,b)=>b.totaal-a.totaal);
  let lastPts=null;
  data.forEach((d,i)=>{
    const rank = d.totaal===lastPts ? "." : String(i+1);
    if(d.totaal!==lastPts) lastPts=d.totaal;
    const medal=(rank==="1")?"🥇 ":(rank==="2")?"🥈 ":(rank==="3")?"🥉 ":"";
    rows.push([
      C(rank,"standrank",2),
      C(medal+d.naam,"",5),
      C(String(d.voorrondes),"center",4),
      C(String(d.finalerondes),"center",3),
      C(String(d.totaal),"pt",3),
    ]);
  });
  rows.push([]);
  // statistiek
  const f=UITSLAGEN.facts;
  rows.push([C("Statistieken","lbl",16)]);
  rows.push([C("Totaal goals:","lbl-r",3),C(f.totalGoals??"—","center",3)]);
  rows.push([C("Gele kaarten:","lbl-r",3),C(f.yellow??"—","center",3)]);
  rows.push([C("Rode kaarten:","lbl-r",3),C(f.red??"—","center",3)]);
  rows.push([C("Topscorer 1:","lbl-r",3),C(f.topscorers[0]||"—","",13)]);
  rows.push([C("Topscorer 2:","lbl-r",3),C(f.topscorers[1]||"—","",13)]);
  rows.push([C("Topscorer 3:","lbl-r",3),C(f.topscorers[2]||"—","",13)]);
  return rows;
}

// ---------- TABS ----------
function renderTabs(){
  const tabs=document.getElementById("tabs");tabs.innerHTML="";
  const all=["Stand",...DEELNEMERS];
  all.forEach(name=>{
    const b=document.createElement("button");
    b.textContent=name;b.className=name===CURRENT?"active":"";
    b.onclick=()=>{CURRENT=name;draw();};
    tabs.append(b);
  });
}
function draw(){
  renderTabs();
  document.getElementById("namestrip").textContent = CURRENT==="Stand"?"Stand":"Voorspellingen — "+CURRENT;
  renderGrid(CURRENT==="Stand"?standRows():participantRows(CURRENT));
  document.querySelector(".sheetwrap").scrollTop=0;
}
draw();
</script>
