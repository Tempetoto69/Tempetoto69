<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempetoto 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">
<style>
:root{
  /* USA-thema: rood-wit-blauw + goud accent */
  --navy:#0a1f47; --navy2:#14306b; --royal:#1c3f7a;
  --rood:#B22234; --rood2:#8f1a28;
  --goud:#E8B923; --goud-soft:#FCE9A6;
  --blue:#2a5298; --blue-soft:#dde6f3;
  --green:#1f8a4c; --green-soft:#d4f0de;
  --grid:#c9d2e0; --hdr:#eef2f8; --hdr-line:#aab6cc;
  --ink:#15233f; --paper:#fff;
  --yellow-soft:#FFF6D8;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  font-family:Calibri,"Segoe UI",sans-serif;color:var(--ink);background:#d6dce4;
  font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden;
}
/* titelbalk — fotobanner */
.titlebar{
  position:relative;flex:0 0 auto;height:220px;overflow:hidden;
  border-bottom:3px solid var(--goud);background:var(--navy);
}
.titlebar img.hero{width:100%;height:100%;object-fit:cover;object-position:center 40%;display:block}
.titlebar .overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:flex-end;
  padding:0 22px;pointer-events:none;
}
.titlebar .meta{text-align:right;text-shadow:0 2px 6px rgba(0,0,0,.8)}
.titlebar .meta .sub{color:#fff;font-size:13px;font-weight:600;letter-spacing:.3px}
/* variant met nette tekst-overlay die het beeld afdekt */
.titlebar .titletext{
  position:absolute;left:24px;top:50%;transform:translateY(-50%);
  font-family:"Russo One",Georgia,serif;font-weight:400;font-size:44px;letter-spacing:1px;
  color:#fff;text-shadow:0 3px 12px rgba(0,0,0,.95),0 0 3px #000;pointer-events:none;z-index:2;
}
.titlebar .titletext b{color:#E8B923}
.titlebar .titletext small{display:block;font-size:14px;font-weight:600;letter-spacing:.5px;color:#eef2fa;text-shadow:0 2px 6px rgba(0,0,0,.95)}
.titlebar::after{content:"";position:absolute;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(90deg,rgba(5,12,30,.78) 0%,rgba(5,12,30,.35) 45%,rgba(5,12,30,0) 70%)}

/* formulebalk-achtige naamstrook */
.namestrip{background:#f3f3f3;border-bottom:1px solid var(--hdr-line);padding:3px 14px;font-size:12px;color:#555;flex:0 0 auto}

/* het werkblad-gebied */
.sheetwrap{flex:1 1 auto;overflow:auto;background:#fff;position:relative}
.sheet{border-collapse:collapse;background:#fff;table-layout:fixed;font-variant-numeric:tabular-nums}
.sheet td,.sheet th{border:1px solid var(--grid);padding:2px 5px;height:20px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;vertical-align:middle}

/* kolomkop-rij (A B C ...) en rij-nummers, net als Excel */
.colhead{background:var(--hdr);color:#444;text-align:center;font-weight:600;border:1px solid var(--hdr-line);font-size:11px;position:sticky;top:0;z-index:3;height:18px}
.rowhead{background:var(--hdr);color:#444;text-align:center;font-weight:600;border:1px solid var(--hdr-line);font-size:11px;position:sticky;left:0;z-index:2;width:34px;min-width:34px}
.corner{position:sticky;top:0;left:0;z-index:4;background:#dcdcdc;border:1px solid var(--hdr-line)}

/* Tempetoto-celstijlen — kleurgebruik zoals origineel */
.lbl{font-weight:700;color:var(--blue)}
.lbl-r{font-weight:600;text-align:right}
.pred{background:#bcd2ec;text-align:center;font-weight:600;color:#0a2a55;border:2px solid #2a5298}
.res{text-align:center;font-weight:600}
.res-box{background:#fff;text-align:center;font-weight:600;border:1px solid #b9c4d6}
.pt{text-align:center;font-weight:700;background:#3b6fb5;color:#fff;border-color:#2a5694}
.pt.good{background:#3b6fb5;color:#fff}
.pt.zero{background:#3b6fb5;color:#cdddf2}
.pt.blank{background:#fff;border:1px solid #b9c4d6}
.pt-ref{text-align:center;font-weight:600;background:#eef2f8;color:#33414f;border:1px solid #cdd6e4}
.pt-ref-hit{background:#3b6fb5;color:#fff}
.pt-ref-me{outline:2px solid var(--goud);outline-offset:-2px}
/* sectiebalk (blauw gevuld, zoals 'Groepswedstrijden' in origineel) */
.grouphdr{background:#B22234;color:#fff;font-weight:700;font-size:13px;letter-spacing:.3px}
/* gekleurde tekst-koppen i.p.v. balk (zoals Groep A blauw, Puntentelling rood) */
.hdr-blue{color:var(--blue);font-weight:700;font-size:13px}
.hdr-red{color:var(--rood);font-weight:700;font-size:13px}
.subhdr{font-size:11px;color:#777;text-align:center;font-weight:600}
.team{padding-left:6px}
.team-r{text-align:right;padding-right:6px}
.cblock{padding:0;border:1px solid #6f6f6f}
.cblock-r{padding:0;border:1px solid #6f6f6f}
.center{text-align:center}.right{text-align:right}
.title-cell{font-size:18px;font-weight:700;color:var(--navy)}
.yellowcell{background:var(--yellow-soft)}
.total-cell{background:#FFE14D;font-weight:700;border:2px solid #1a1a1a;text-align:center}
.pt-red{background:var(--rood);color:#fff;font-weight:700;text-align:center;border-color:var(--rood2)}
.sheet td.rules{font-size:11px;color:#444;white-space:normal;line-height:1.45;overflow:visible;height:auto;text-overflow:clip}
.flag{margin-right:3px}

/* STAND-tab specifiek */
.standrank{text-align:center;font-weight:700}
.me{background:var(--yellow-soft)}
.delta-up{color:var(--green);font-weight:700;text-align:center}
.delta-down{color:var(--rood);font-weight:700;text-align:center}
.delta-zero{color:#aaa;text-align:center}

/* tabbladen onderaan, net als Excel */
.tabs{flex:0 0 auto;display:flex;background:#f3f3f3;border-top:1px solid var(--hdr-line);overflow-x:auto;align-items:stretch}
.tabs button{
  border:1px solid var(--hdr-line);border-bottom:0;background:#e4e4e4;padding:6px 16px;font:inherit;
  cursor:pointer;white-space:nowrap;color:#444;border-radius:0;margin-right:-1px;
}
.tabs button:hover{background:#eee}
.tabs button.active{background:#fff;color:var(--navy);font-weight:700;border-top:2px solid var(--darkred);position:relative;z-index:1}
.tabs .grp-marker{padding:6px 8px;color:#999;font-size:11px;display:flex;align-items:center}
@media print{.tabs,.titlebar,.namestrip{display:none}.sheetwrap{overflow:visible}}

/* ---- Mobile ---- */
@media (max-width: 600px) {
  .titlebar{height:120px}
  .titlebar .titletext{font-size:26px;left:14px}
  .titlebar .titletext small{font-size:11px}
  .tabs button{padding:10px 14px;font-size:13px}
  body{font-size:13px}
}
/* iOS Safari 100dvh fix */
@supports (height: 100dvh) {
  body{height:100dvh}
}
/* Smooth touch scroll op het werkblad */
.sheetwrap{-webkit-overflow-scrolling:touch}
</style>
</head>
<body>
<div class="titlebar">
  <img class="hero" src="banner.jpg" alt="Tempetoto 2026">
  <div class="titletext">TEMPETOTO <b>2026</b><small>WK voetbal · VS · Canada · Mexico</small></div>
</div>
<div class="namestrip" id="namestrip">Tempetoto</div>
<div class="sheetwrap"><div id="sheet"></div></div>
<div class="tabs" id="tabs"></div>

<script src="data.js"></script>
<script>

// ============================================================
//  TEMPETOTO 2026 — RENDER (read-only, Excel-look)
// ============================================================

let CURRENT = "Stand";

// ---------- SCORING ----------
function parseScore(s){
  if(!s||typeof s!=="string"||!s.includes("-")) return null;
  const [h,a]=s.split("-").map(x=>parseInt(x,10));
  if(isNaN(h)||isNaN(a)) return null;
  return [h,a];
}
function toto(h,a){return h>a?1:h<a?-1:0;}

function scoreGroup(pred,res){
  const p=parseScore(pred),r=parseScore(res);
  if(!p||!r) return 0;
  let pts=0;
  if(toto(p[0],p[1])===toto(r[0],r[1])) pts+=SCORING.group.toto;
  if(p[0]===r[0]&&p[1]===r[1]) pts+=SCORING.group.exact;
  return pts;
}
function scoreKo(pred,res,round){
  const p=parseScore(pred),r=parseScore(res);
  if(!p||!r) return 0;
  let pts=0;
  if(toto(p[0],p[1])===toto(r[0],r[1])) pts+=round.toto;
  if(p[0]===r[0]&&p[1]===r[1]) pts+=round.exact;
  return pts;
}
function teamReached(land){
  let reached=null;
  for(const r of KO_ROUNDS){
    const br=UITSLAGEN.ko.brackets[r.key]||[];
    if(br.some(d=>d.home===land||d.away===land)) reached=r.key;
  }
  if(UITSLAGEN.facts.champion===land) reached="WIN";
  return reached;
}
// Verrassing: outsider — basis per ronde x onwaarschijnlijkheidsfactor, afgerond
function surprisePtsFor(land, round){
  const b=SCORING.surprise.base[round]; if(b==null) return 0;
  return Math.round(b * surpriseFactor(land));
}
function surprisePts(land){
  const r=teamReached(land); if(r==null) return 0;
  const key = r==="WIN" ? "winner" : r;
  return surprisePtsFor(land, key);
}
// Deceptie: favoriet — basis per uitschakelronde x favoriet-factor, afgerond
function deceptionPtsFor(land, exit){
  const b=SCORING.deception.base[exit]; if(b==null) return 0;
  return Math.round(b * deceptionFactor(land));
}
// Een ronde is pas "bekend" als alle bracket-slots echte landen bevatten —
// tot die tijd is een uitschakeling niet definitief en telt deceptie niet.
const ALLE_LANDEN=Object.values(GROUPS).flat();
function rondeGevuld(key){
  const br=UITSLAGEN.ko.brackets[key]||[];
  return br.length>0 && br.every(d=>ALLE_LANDEN.includes(d.home)&&ALLE_LANDEN.includes(d.away));
}
function deceptionExit(land){
  const r=teamReached(land);
  if(r==null) return rondeGevuld("R32") ? "groep" : null;
  const volgende={R32:"R16",R16:"KF",KF:"HF"}[r];
  if(!volgende||!rondeGevuld(volgende)) return null; // HF of verder, of ronde nog bezig
  return r;
}
function deceptionPts(land){
  const ex=deceptionExit(land);
  return ex ? deceptionPtsFor(land, ex) : 0;
}

// Maximaal haalbare eindscore: "alles wat nog open staat valt goed".
// KO-rondes zonder uitslag tellen volledig mee — voorspellingen daarvoor komen pas vóór elke ronde.
function stillAlive(land){
  if(UITSLAGEN.facts.champion) return UITSLAGEN.facts.champion===land;
  const r=teamReached(land);
  const volgende = r==null ? "R32" : {R32:"R16",R16:"KF",KF:"HF",HF:"F"}[r];
  if(!volgende) return true; // staat in de finale
  return !rondeGevuld(volgende);
}
function maxScore(naam,cur){
  if(UITSLAGEN.facts.champion) return cur.totaal; // toernooi klaar
  const v=VOORSPELLINGEN[naam], u=UITSLAGEN, p=v.prematch;
  let max=cur.group+cur.advance+cur.ko;
  for(const m of GROUP_MATCHES)
    if(!parseScore(u.group[m.id])&&parseScore(v.group[m.id])) max+=SCORING.group.toto+SCORING.group.exact;
  for(const g of Object.keys(GROUPS))
    if(!(u.advancers.top2[g]||[]).length) max+=(v.top2[g]||[]).filter(Boolean).length*SCORING.advance.perTeam;
  if(!(u.advancers.best3||[]).length) max+=(v.best3||[]).filter(Boolean).length*SCORING.advance.perTeam;
  for(const r of KO_ROUNDS)
    (u.ko.brackets[r.key]||[]).forEach((_,i)=>{ if(!parseScore((u.ko.results[r.key]||[])[i])) max+=r.toto+r.exact; });
  if(p.champion&&stillAlive(p.champion)) max+=SCORING.champion.winner;
  if(p.surprise) max+= stillAlive(p.surprise)
    ? Math.round(SCORING.surprise.base.winner*surpriseFactor(p.surprise))
    : surprisePts(p.surprise);
  if(p.deception){
    const r=teamReached(p.deception);
    const best=deceptionExit(p.deception)||
      (r==null ? (rondeGevuld("R32")?null:"groep") : {R32:"R32",R16:"R16",KF:"KF"}[r]||null);
    if(best) max+=deceptionPtsFor(p.deception,best);
  }
  if(p.topscorer)            max+=SCORING.topscorer.p1;
  if(p.topscorerGoals!=="")  max+=SCORING.topscorer.exactGoals;
  if(p.totalGoals!=="")      max+=SCORING.totalGoals.exact;
  if(p.yellow!=="")          max+=SCORING.cards.exact;
  if(p.red!=="")             max+=SCORING.cards.exact;
  return max;
}

function computeScore(naam){
  const v=VOORSPELLINGEN[naam], u=UITSLAGEN;
  let group=0,advance=0,ko=0,prematch=0;

  for(const m of GROUP_MATCHES) group+=scoreGroup(v.group[m.id],u.group[m.id]);

  for(const g of Object.keys(GROUPS)){
    const pred=(v.top2[g]||[]).filter(Boolean), real=(u.advancers.top2[g]||[]);
    for(const land of pred) if(real.includes(land)) advance+=SCORING.advance.perTeam;
  }
  for(const land of (v.best3||[]).filter(Boolean))
    if((u.advancers.best3||[]).includes(land)) advance+=SCORING.advance.perTeam;

  for(const r of KO_ROUNDS){
    const preds=v.ko[r.key]||[], reals=u.ko.results[r.key]||[];
    reals.forEach((res,i)=>{ if(preds[i]!=null) ko+=scoreKo(preds[i],res,r); });
  }

  const p=v.prematch,f=u.facts;
  if(p.champion&&f.champion){
    if(p.champion===f.champion) prematch+=SCORING.champion.winner;
    else if(p.champion===f.finalist) prematch+=SCORING.champion.finalist;
  }
  if(p.surprise) prematch+=surprisePts(p.surprise);
  if(p.deception) prematch+=deceptionPts(p.deception);
  if(p.topscorer){
    const rk=f.topscorers.indexOf(p.topscorer);
    if(rk===0)prematch+=SCORING.topscorer.p1;else if(rk===1)prematch+=SCORING.topscorer.p2;else if(rk===2)prematch+=SCORING.topscorer.p3;
  }
  if(p.topscorerGoals!==""&&f.topscorerGoals!=null&&Number(p.topscorerGoals)===Number(f.topscorerGoals)) prematch+=SCORING.topscorer.exactGoals;
  if(p.totalGoals!==""&&f.totalGoals!=null){const d=Math.abs(Number(p.totalGoals)-Number(f.totalGoals));const x=SCORING.totalGoals.exact-d;if(x>0)prematch+=x;}
  for(const k of ["yellow","red"]) if(p[k]!==""&&f[k]!=null){const d=Math.abs(Number(p[k])-Number(f[k]));const x=SCORING.cards.exact-d;if(x>0)prematch+=x;}

  const voorrondes=group+advance+prematch, finalerondes=ko;
  return {group,advance,ko,prematch,voorrondes,finalerondes,totaal:voorrondes+finalerondes};
}

// ---------- SPREADSHEET BOUWER ----------
// We bouwen een grid: rijen van cellen {c:tekst, cls:class, span:n}.
// De renderer plakt er kolomletters (A,B,..) en rijnummers omheen, Excel-stijl.
const NCOLS = 20; // A..T
function colLetter(i){ let s="";i++;while(i>0){i--;s=String.fromCharCode(65+i%26)+s;i=Math.floor(i/26);}return s; }

function renderGrid(rows, opts){
  const ncols = (opts && opts.ncols) || NCOLS;
  const widths = (opts && opts.widths) || [34, 16,80, 16,80, 62,62,32, 14, 16,80, 16,80, 62,62,32, 32,32,32,32,32];
  const sheet=document.getElementById("sheet");
  const tbl=document.createElement("table");tbl.className="sheet";
  // kolombreedtes
  const colgroup=document.createElement("colgroup");
  let totalW=0;
  for(let i=0;i<=ncols;i++){const w=widths[i]||32;const col=document.createElement("col");col.style.width=w+"px";colgroup.append(col);totalW+=w;}
  tbl.append(colgroup);
  tbl.style.width=totalW+"px";
  // kolomkoppen
  const head=document.createElement("tr");
  head.append(cell("","corner"));
  for(let i=0;i<ncols;i++) head.append(cell(colLetter(i),"colhead"));
  tbl.append(head);
  // datarijen
  rows.forEach((row,ri)=>{
    const tr=document.createElement("tr");
    tr.append(cell(String(ri+1),"rowhead"));
    let used=0;
    (row||[]).forEach(c=>{
      const td=document.createElement("td");
      td.className=c.cls||"";
      if(c.style)td.style.cssText=c.style;
      if(c.span&&c.span>1){td.colSpan=c.span;used+=c.span;}else used++;
      td.innerHTML=c.c!=null?c.c:"";
      if(c.title)td.title=c.title;
      tr.append(td);
    });
    for(;used<ncols;used++) tr.append(document.createElement("td"));
    tbl.append(tr);
  });
  sheet.innerHTML="";sheet.append(tbl);
}
function cell(text,cls){const e=document.createElement("th");e.className=cls;e.textContent=text;return e;}
function C(c,cls,span,title){return {c,cls,span,title};}
function blank(n){return Array.from({length:n},()=>C(""));}

// ---------- DEELNEMER-SHEET ----------
function participantRows(naam){
  const v=VOORSPELLINGEN[naam], u=UITSLAGEN, sc=computeScore(naam);
  const rows=[];
  const push=(...cells)=>rows.push(cells);
  const empty=()=>rows.push([]);

  // titel
  push(C(`Tempetoto 2026 — ${naam}`,"title-cell",6));
  empty();

  // ===== Vooraf voorspeld — nu links/bovenaan (kolommen A-G) =====
  const pre=v.prematch;
  const champPts = pre.champion&&u.facts.champion ? (pre.champion===u.facts.champion?SCORING.champion.winner:(pre.champion===u.facts.finalist?SCORING.champion.finalist:0)) : 0;
  const preRow=(label,val,pts)=>{
    const r=[];
    r.push(C(label,"lbl-r",4));   // cols 1-4: label (genoeg ruimte)
    r.push(C(val||"","pred",2));  // cols 5-6: waarde
    r.push(C(pts!=null?String(pts):"",pts>0?"pt-red":"pt zero")); // col 7: punten
    return r;
  };
  rows.push([C("Vooraf voorspeld","grouphdr",7)]);
  const champRow=preRow("Kampioen:",flagName(pre.champion),champPts);
  if(pre.championNote) champRow.push(C(pre.championNote,"rules",8)); // col 8+: toelichting deelnemer
  rows.push(champRow);
  rows.push(preRow("Verrassing:",flagName(pre.surprise),pre.surprise?surprisePts(pre.surprise):0));
  rows.push(preRow("Deceptie:",flagName(pre.deception),pre.deception?deceptionPts(pre.deception):0));
  rows.push(preRow("Topscorer (naam):",pre.topscorer,topscorerPts(pre)));
  rows.push(preRow("↳ Aantal goals:",pre.topscorerGoals||"",null));
  rows.push(preRow("Totaal goals:",pre.totalGoals||"",totalGoalsPts(pre)));
  rows.push(preRow("Gele kaarten:",pre.yellow||"",cardPts(pre,"yellow")));
  rows.push(preRow("Rode kaarten:",pre.red||"",cardPts(pre,"red")));
  empty();

  // ===== Spelregels (uit de originele Tempetoto, bijgewerkt voor WK-format) =====
  push(C("Spelregels:","hdr-blue",NCOLS));
  for(const regel of SPELREGELS) push(C("• "+regel,"rules",NCOLS));
  empty();

  // ===== Puntentelling =====
  push(C("Puntentelling:","hdr-red",NCOLS));
  for(const [kop,tekst] of PUNTENTELLING){
    const r=[]; r.push(C(kop,"lbl-r",4)); r.push(C(tekst,"rules",16)); rows.push(r);
  }
  empty();

  // subtotalen
  const subRow=(label,val,cls)=>{const r=blank(11);r.push(C(label,"lbl-r",6));r.push(C(String(val),cls||"pt",3));return r;};
  empty();

  // groepswedstrijden — twee kolommen naast elkaar (links A-F, rechts G-L per paar)
  push(C("Groepswedstrijden","grouphdr",NCOLS));
  const groups=Object.keys(GROUPS);
  for(let i=0;i<groups.length;i+=2){
    const gl=groups[i], gr=groups[i+1];
    // groepkop-rij — voorsp./uitslag/pt. boven kolommen 5,6,7
    const hr=[];
    hr.push(C(`Groep ${gl}`,"hdr-blue",4));               // 1-4: groepnaam over team-kolommen
    hr.push(C("voorsp.","subhdr"));hr.push(C("uitslag","subhdr"));hr.push(C("pt.","subhdr")); // 5,6,7
    hr.push(C(""));                                        // 8: spacer
    if(gr){
      hr.push(C(`Groep ${gr}`,"hdr-blue",4));             // 9-12
      hr.push(C("voorsp.","subhdr"));hr.push(C("uitslag","subhdr"));hr.push(C("pt.","subhdr")); // 13,14,15
    }
    rows.push(hr);
    // 6 wedstrijden
    const ml=GROUP_MATCHES.filter(m=>m.group===gl);
    const mr=gr?GROUP_MATCHES.filter(m=>m.group===gr):[];
    for(let k=0;k<6;k++){
      const r=[];
      r.push(...matchCells(v,u,ml[k]));
      r.push(C(""));
      if(gr) r.push(...matchCells(v,u,mr[k]));
      rows.push(r);
    }
    // doorgaan: Groepswinnaar + Runner-up (twee regels)
    advanceRows(v,u,gl,gr).forEach(r=>rows.push(r));
    empty();
  }
  empty();

  // beste nummers 3 — strakke lijst: kleurblok + land + puntvak, twee kolommen van 4
  push(C("Beste 8 nummers 3 (3 pt per goed voorspeld land)","grouphdr",NCOLS));
  const b3pred=(v.best3||[]);
  const b3real=(u.advancers.best3||[]);
  const b3line=(idx)=>{
    const land=b3pred[idx];
    const good=land&&b3real.includes(land);
    const pts = land ? (good?"3":"0") : "";
    // cblock(1) + nr/land(span4) + puntvak(span2) = lijnt punt uit op brede kolom
    return [
      cblock(land||""),
      C(land?`${idx+1}. ${flagName(land)}`:`${idx+1}.`,"team",4),
      C(pts,"pt"+(good?" good":" zero")),
    ];
  };
  for(let i=0;i<4;i++){
    const r=[...b3line(i)];        // links: 1-4  (cols 1-6)
    r.push(C(""));                 // spacer col 7
    r.push(C(""));                 // spacer col 8
    r.push(...b3line(i+4));        // rechts: 5-8 (cols 9-14)
    rows.push(r);
  }
  empty();

  // subtotaal groepsfase
  rows.push(subRow("Subtotaal groepsfase:",sc.voorrondes,"pt"));
  empty();

  // knock-out
  push(C("Knock-out (uitslag na 90 min)","grouphdr",NCOLS));
  for(const round of KO_ROUNDS){
    const br=u.ko.brackets[round.key]||[];
    push(C(`${round.naam}  ·  toto ${round.toto} / exact +${round.exact}`,"lbl",NCOLS));
    if(!br.length){
      push(C("— wedstrijden worden later aangevuld —","subhdr",NCOLS));
      rows.push(subRow(`Subtotaal ${round.naam}:`, 0, "pt"));
      continue;
    }
    push(C(""),C(""),C("voorsp.","subhdr"),C("uitslag","subhdr"),C("pt.","subhdr"));
    let roundPts=0;
    br.forEach((duel,i)=>{
      const pred=(v.ko[round.key]||[])[i]||"";
      const res=(u.ko.results[round.key]||[])[i]||"";
      const pts=scoreKo(pred,res,round);
      if(res) roundPts+=pts;
      const r=[];
      r.push(C(flagName(duel.home)+" – "+flagName(duel.away),"team",2));
      r.push(C(pred||"","pred"));r.push(C(res||"","res"));r.push(C(res?String(pts):"","pt"+(pts>0?" good":" zero")));
      rows.push(r);
    });
    rows.push(subRow(`Subtotaal ${round.naam}:`, roundPts, "pt"));
  }
  empty();

  // subtotaal KO + eindtotaal
  rows.push(subRow("Subtotaal KO:",sc.finalerondes,"pt"));
  rows.push(subRow("TOTAAL:",sc.totaal,"total-cell"));
  empty();

  // ===== Addendum: verrassing & deceptie tabellen =====
  push(C("Addendum — Verrassing & Deceptie tabellen","grouphdr",NCOLS));
  empty();
  buildSurpriseTable(v,u).forEach(r=>rows.push(r));
  empty();
  buildDeceptionTable(v,u).forEach(r=>rows.push(r));
  return rows;
}

function flagName(land){return land?((typeof FLAGS!=="undefined"&&FLAGS[land])?FLAGS[land]+" ":"")+land:"";}

// rondes als oplopende kolommen; punten schalen met FIFA-ranking (onwaarschijnlijkheid)
function buildSurpriseTable(v,u){
  const cols=[["R16","R16"],["KF","KF"],["HF","HF"],["F","Finale"],["winner","Winnaar"]];
  const rows=[];
  rows.push([C("Verrassing — kies een land BUITEN de top-12 · punten lopen op met onwaarschijnlijkheid (FIFA-ranking)","grouphdr",NCOLS)]);
  const hr=[C("Outsider","subhdr",5)];
  cols.forEach(c=>hr.push(C(c[1],"subhdr",3)));
  rows.push(hr);
  const chosen=v.prematch.surprise;
  // sorteer outsiders op ranking (sterkste eerst), zodat oplopende punten zichtbaar zijn
  const outs=alleOutsiders().sort((a,b)=>(RANKING[a]||50)-(RANKING[b]||50));
  const order=["R16","KF","HF","F","winner"];
  for(const land of outs){
    const reached=teamReached(land);
    const reachedKey = reached==="WIN"?"winner":reached;
    const r=[ C((land===chosen?"➤ ":"")+flagName(land), land===chosen?"lbl":"team",5) ];
    cols.forEach(c=>{

      r.push(C(String(pts),"pt-ref"+(got?" pt-ref-hit":"")+(land===chosen?" pt-ref-me":""),3));
    });
    rows.push(r);
  }
  return rows;
}

// ---------- STAND-SHEET ----------
// Punten per groepsspeelronde (1-3): per groep zijn wedstrijd 1-2 ronde 1, 3-4 ronde 2, 5-6 ronde 3
function rondePunten(){
  const pts={1:{},2:{},3:{}}, compleet={1:true,2:true,3:true}, gespeeld={1:false,2:false,3:false};
  for(const m of GROUP_MATCHES){
    const rd=Math.ceil(parseInt(m.id.slice(1),10)/2);
    if(!parseScore(UITSLAGEN.group[m.id])){compleet[rd]=false;continue;}
    gespeeld[rd]=true;
    for(const n of DEELNEMERS) pts[rd][n]=(pts[rd][n]||0)+scoreGroup(VOORSPELLINGEN[n].group[m.id],UITSLAGEN.group[m.id]);
  }
  return {pts,compleet,gespeeld};
}

// Punten per KO-ronde; compleet zodra de bracket echt gevuld is én alle uitslagen binnen zijn
function koPunten(){
  const out={};
  for(const r of KO_ROUNDS){
    const reals=UITSLAGEN.ko.results[r.key]||[], br=UITSLAGEN.ko.brackets[r.key]||[];
    const pts={}; let gespeeld=false;
    const compleet=rondeGevuld(r.key)&&br.length>0&&br.every((_,i)=>parseScore(reals[i]));
    br.forEach((_,i)=>{
      if(!parseScore(reals[i])) return;
      gespeeld=true;
      for(const n of DEELNEMERS)
        pts[n]=(pts[n]||0)+scoreKo((VOORSPELLINGEN[n].ko[r.key]||[])[i],reals[i],r);
    });
    out[r.key]={pts,compleet,gespeeld};
  }
  return out;
}

// ---------- ALL TIME RANKING ----------
function alltimeRows(){
  const jaren = ALLTIME_DATA.jaren;

  const data = ALLTIME_DATA.deelnemers.map(d => {
    const histTotaal = jaren.reduce((s,j) => s + (d.scores[j] || 0), 0);
    const pts2026 = d.deelnemer2026 ? computeScore(d.deelnemer2026).totaal : 0;
    return {...d, histTotaal, pts2026, totaal: histTotaal + pts2026};
  });

  // Historische ranking (voor trendberekening)
  const byhist = [...data].sort((a,b) => b.histTotaal - a.histTotaal);
  const histRank = {};
  let hr=0, hLast=-1;
  byhist.forEach((d,i) => { if(d.histTotaal!==hLast){hLast=d.histTotaal;hr=i+1;} histRank[d.naam]=hr; });

  data.sort((a,b) => b.totaal - a.totaal);
  const currRank = {};
  let cr=0, cLast=-1;
  data.forEach((d,i) => { if(d.totaal!==cLast){cLast=d.totaal;cr=i+1;} currRank[d.naam]=cr; });

  // Winnaar(s) per jaar — voor goud-emoji in de cel
  const maxPerJaar = {};
  jaren.forEach(j => {
    maxPerJaar[j] = Math.max(...data.map(d => d.scores[j] || 0));
  });
  const max2026 = Math.max(...data.filter(d=>d.deelnemer2026).map(d=>d.pts2026));

  const rows = [];
  rows.push([C("All Time Tempetoto Ranking","title-cell",12)]);
  rows.push([]);

  const hdr = [C("#","grouphdr"),C("","grouphdr"),C("Naam","grouphdr",2)];
  jaren.forEach(j => hdr.push(C(String(j),"grouphdr right")));
  hdr.push(C("2026","grouphdr right"),C("Totaal","grouphdr right"));
  rows.push(hdr);

  let lastTotaal=null, rankNr=0;
  data.forEach((d,i) => {
    if(d.totaal!==lastTotaal){lastTotaal=d.totaal;rankNr=i+1;}

    const isNieuw = Object.keys(d.scores).length === 0;
    let trendTxt="", trendCls="delta-zero";
    if(isNieuw){ trendTxt="★"; }
    else {
      const prev=histRank[d.naam], curr=currRank[d.naam];
      if(curr<prev){trendTxt="↑";trendCls="delta-up";}
      else if(curr>prev){trendTxt="↓";trendCls="delta-down";}
      else trendTxt="=";
    }

    const medal = rankNr===1?"🥇 ":rankNr===2?"🥈 ":rankNr===3?"🥉 ":"";
    const r = [C(String(rankNr),"standrank"),C(trendTxt,trendCls),C(medal+d.naam,"",2)];
    jaren.forEach(j => {
      const s = d.scores[j];
      const winnaar = s > 0 && s === maxPerJaar[j];
      const txt = s > 0 ? (winnaar ? "🥇"+s : String(s)) : "—";
      r.push(C(txt, s>0?"right":"delta-zero center"));
    });
    const cls26 = !d.deelnemer2026 ? "delta-zero center" : d.pts2026>0 ? "right" : "delta-zero center";
    const win26 = d.pts2026 > 0 && d.pts2026 === max2026;
    const txt26 = d.deelnemer2026 ? (win26 ? "🥇"+d.pts2026 : String(d.pts2026)) : "—";
    r.push(C(txt26, cls26));
    r.push(C(String(d.totaal),"pt"));
    rows.push(r);
  });

  return rows;
}

// ---------- STATS-SHEET ----------
function statsRows(){
  const rows=[]; const push=(...c)=>rows.push(c);
  const ingevuld=DEELNEMERS.filter(n=>Object.keys(VOORSPELLINGEN[n].group||{}).length>0);
  push(C("Statistieken — de voorspellingen onder de loep","title-cell",16));
  push(C(`Gebaseerd op ${ingevuld.length} van de ${DEELNEMERS.length} ingeleverde voorspellingen.`,"rules",16));
  rows.push([]);

  // verdeling van de prematch-keuzes
  const verdeling=(label,veld)=>{
    push(C(label,"grouphdr",12));
    const cnt={};
    ingevuld.forEach(n=>{const x=VOORSPELLINGEN[n].prematch[veld];if(x)(cnt[x]=cnt[x]||[]).push(n);});
    Object.entries(cnt).sort((a,b)=>b[1].length-a[1].length).forEach(([x,wie])=>{
      const namen=veld==="topscorer"
        ? wie.map(n=>`${n} (${VOORSPELLINGEN[n].prematch.topscorerGoals||"?"})`).join(", ")
        : wie.join(", ");
      push(C(veld==="topscorer"?x:flagName(x),"team",3),C(wie.length+"×","center"),C(namen,"rules",8));
    });
    if(!Object.keys(cnt).length) push(C("— nog geen keuzes binnen —","subhdr",12));
    rows.push([]);
  };
  verdeling("Kampioen","champion");
  verdeling("Topscorer","topscorer");
  verdeling("Verrassing","surprise");
  verdeling("Deceptie","deception");

  // optimisme: gemiddeld voorspelde goals per wedstrijd
  push(C("Optimisme — voorspelde goals","grouphdr",12));
  push(C("Naam","subhdr",3),C("gem. per wedstrijd","subhdr",3),C("totaal goals WK","subhdr",3));
  ingevuld.map(n=>{
    const sc=Object.values(VOORSPELLINGEN[n].group).map(parseScore).filter(Boolean);
    const avg=sc.length?sc.reduce((a,p)=>a+p[0]+p[1],0)/sc.length:0;
    return {n,avg,tot:VOORSPELLINGEN[n].prematch.totalGoals||"—"};
  }).sort((a,b)=>b.avg-a.avg).forEach(d=>
    push(C(d.n,"team",3),C(d.avg.toFixed(2),"center",3),C(String(d.tot),"center",3)));
  rows.push([]);

  // eigenwijsheid + unieke toto's (heeft minstens 3 voorspellingen nodig)
  if(ingevuld.length>=3){
    const stats={}; ingevuld.forEach(n=>stats[n]={af:0,tot:0,uniek:0});
    for(const m of GROUP_MATCHES){
      const ts=ingevuld.map(n=>{const p=parseScore(VOORSPELLINGEN[n].group[m.id]);return p?{n,t:toto(p[0],p[1])}:null;}).filter(Boolean);
      if(ts.length<3) continue;
      const cnt={}; ts.forEach(x=>cnt[x.t]=(cnt[x.t]||0)+1);
      const maxC=Math.max(...Object.values(cnt));
      ts.forEach(x=>{
        stats[x.n].tot++;
        if(cnt[x.t]!==maxC) stats[x.n].af++;
        if(cnt[x.t]===1) stats[x.n].uniek++;
      });
    }
    push(C("Eigenwijsheid — afwijken van de meerderheids-toto","grouphdr",12));
    push(C("Naam","subhdr",3),C("% afwijkend","subhdr",3),C("unieke toto's","subhdr",3));
    ingevuld.map(n=>({n,...stats[n],pct:stats[n].tot?100*stats[n].af/stats[n].tot:0}))
      .sort((a,b)=>b.pct-a.pct)
      .forEach(d=>push(C(d.n,"team",3),C(d.pct.toFixed(0)+"%","center",3),C(String(d.uniek),"center",3)));
    rows.push([]);
  } else {
    push(C("Eigenwijsheid & unieke toto's: beschikbaar zodra 3+ voorspellingen binnen zijn.","rules",16));
    rows.push([]);
  }

  // gelijkenis tussen deelnemers
  if(ingevuld.length>=2){
    const paren=[];
    for(let i=0;i<ingevuld.length;i++) for(let j=i+1;j<ingevuld.length;j++){
      const a=ingevuld[i],b=ingevuld[j]; let zelfde=0,samen=0;
      for(const m of GROUP_MATCHES){
        const pa=parseScore(VOORSPELLINGEN[a].group[m.id]), pb=parseScore(VOORSPELLINGEN[b].group[m.id]);
        if(!pa||!pb) continue;
        samen++; if(toto(pa[0],pa[1])===toto(pb[0],pb[1])) zelfde++;
      }
      if(samen>=10) paren.push({a,b,pct:100*zelfde/samen});
    }
    paren.sort((x,y)=>y.pct-x.pct);
    push(C("Twee handen op één buik — % gelijke toto's","grouphdr",12));
    const toon=paren.length>13?[...paren.slice(0,8),null,...paren.slice(-3)]:paren;
    toon.forEach(p=>{
      if(!p){push(C("⋮","subhdr",9));return;}
      push(C(`${p.a} & ${p.b}`,"team",4),C(p.pct.toFixed(0)+"%","center",2));
    });
    rows.push([]);
  }

  // rivaliteitsmatrix: wie spreekt wie tegen + onderlinge duels
  if(ingevuld.length>=2){
    const rivalen=[];
    for(let i=0;i<ingevuld.length;i++) for(let j=i+1;j<ingevuld.length;j++){
      const a=ingevuld[i],b=ingevuld[j]; let oneens=0,samen=0,wa=0,wb=0;
      for(const m of GROUP_MATCHES){
        const pa=parseScore(VOORSPELLINGEN[a].group[m.id]), pb=parseScore(VOORSPELLINGEN[b].group[m.id]);
        if(!pa||!pb) continue;
        samen++;
        if(toto(pa[0],pa[1])!==toto(pb[0],pb[1])){
          oneens++;
          if(parseScore(UITSLAGEN.group[m.id])){
            const sa=scoreGroup(VOORSPELLINGEN[a].group[m.id],UITSLAGEN.group[m.id]);
            const sb=scoreGroup(VOORSPELLINGEN[b].group[m.id],UITSLAGEN.group[m.id]);
            if(sa>sb)wa++; else if(sb>sa)wb++;
          }
        }
      }
      if(samen>=10) rivalen.push({a,b,pct:100*oneens/samen,wa,wb});
    }
    rivalen.sort((x,y)=>y.pct-x.pct);
    push(C("Rivalen — wie spreekt wie het vaakst tegen","grouphdr",12));
    push(C("Rivaliteit","subhdr",4),C("% oneens","subhdr",2),C("duelstand","subhdr",3));
    rivalen.slice(0,8).forEach(p=>
      push(C(`${p.a} ⚔ ${p.b}`,"team",4),C(p.pct.toFixed(0)+"%","center",2),
           C(p.wa||p.wb?`${p.wa}-${p.wb}`:"—","center",3)));
    push(C("Duelstand: bij elke wedstrijd waar de twee een andere toto hadden, wint wie daar de meeste punten pakte.","rules",16));
    rows.push([]);
  }

  // vorm-curve & streaks (pas zinvol zodra er uitslagen zijn)
  const gespeeld=GROUP_MATCHES.filter(m=>parseScore(UITSLAGEN.group[m.id]));
  if(gespeeld.length){
    const volg=m=>SPEELSCHEMA&&SPEELSCHEMA.groepsfase&&SPEELSCHEMA.groepsfase[m.id]?SPEELSCHEMA.groepsfase[m.id].nr:GROUP_MATCHES.indexOf(m);
    const chrono=[...gespeeld].sort((a,b)=>volg(a)-volg(b));
    push(C("Vorm — toto-reeksen en dagrecords","grouphdr",12));
    push(C("Naam","subhdr",3),C("langste reeks","subhdr",3),C("huidige reeks","subhdr",3),C("beste dag","subhdr",3));
    ingevuld.map(n=>{
      let best=0,cur=0;
      for(const m of chrono){
        const p=parseScore(VOORSPELLINGEN[n].group[m.id]), r=parseScore(UITSLAGEN.group[m.id]);
        cur=(p&&toto(p[0],p[1])===toto(r[0],r[1]))?cur+1:0;
        if(cur>best)best=cur;
      }
      let bdag="—";
      if(HISTORIE&&HISTORIE.length>1){
        let bd=0,bdat=null;
        for(let i=1;i<HISTORIE.length;i++){
          const d=(HISTORIE[i].stand[n]??0)-(HISTORIE[i-1].stand[n]??0);
          if(d>bd){bd=d;bdat=HISTORIE[i].datum;}
        }
        if(bdat) bdag=`+${bd} op ${bdat.slice(5).split("-").reverse().join("/")}`;
      }
      return {n,best,cur,bdag};
    }).sort((a,b)=>b.best-a.best||b.cur-a.cur).forEach(d=>
      push(C(d.n,"team",3),C(String(d.best),"center",3),C(String(d.cur),"center",3),C(d.bdag,"center",3)));
    push(C("Reeks = opeenvolgende wedstrijden met de toto goed, in speelvolgorde.","rules",16));
    rows.push([]);
  } else {
    push(C("Vorm & reeksen: beschikbaar zodra de eerste uitslagen binnen zijn.","rules",16));
    rows.push([]);
  }

  // kampioenskerkhof
  push(C("Kampioenskerkhof","grouphdr",12));
  const kampioenen={};
  ingevuld.forEach(n=>{const k=VOORSPELLINGEN[n].prematch.champion;if(k)(kampioenen[k]=kampioenen[k]||[]).push(n);});
  const exitNaam=r=>r==="groep"?"de groepsfase":((KO_ROUNDS.find(x=>x.key===r)||{}).naam||r).toLowerCase();
  const dood=Object.entries(kampioenen).filter(([l])=>!stillAlive(l));
  const levend=Object.entries(kampioenen).filter(([l])=>stillAlive(l));
  dood.forEach(([land,wie])=>{
    const r=teamReached(land);
    push(C("🪦","center"),C(flagName(land),"team",3),
         C(`Hier rust de kampioen van ${wie.join(", ")} — gesneuveld in ${exitNaam(r==null?"groep":r)}.`,"rules",10));
  });
  if(!dood.length) push(C("Het kerkhof is nog leeg — alle kampioenen zijn in leven. 🌷","rules",16));
  if(levend.length&&dood.length)
    push(C("Nog in leven: "+levend.map(([l,wie])=>`${flagName(l)} (${wie.join(", ")})`).join(" · "),"rules",16));
  rows.push([]);

  return rows;
}

// ---------- STANDVERLOOP-GRAFIEK ----------
let HISTORIE=null;
fetch("stand_historie.json").then(r=>r.ok?r.json():null)
  .then(h=>{HISTORIE=h;if(CURRENT==="Stand"||CURRENT==="Stats")draw();}).catch(()=>{});
let SPEELSCHEMA=null; // wedstrijden.json: speelvolgorde voor de vorm-reeksen
fetch("wedstrijden.json").then(r=>r.ok?r.json():null)
  .then(w=>{SPEELSCHEMA=w;if(CURRENT==="Stats")draw();}).catch(()=>{});
const LIJN_KLEUREN=["#B22234","#1c3f7a","#1f8a4c","#E8B923","#7b2d8b","#0aa9a9","#e2711d","#5b6770","#c2185b","#274e13"];
function chartHTML(){
  if(!HISTORIE||HISTORIE.length<2) return "";
  const W=760,H=330,P={l:42,r:130,t:16,b:30};
  const maxY=Math.max(10,...HISTORIE.flatMap(s=>Object.values(s.stand||{})));
  const x=i=>P.l+(W-P.l-P.r)*i/(HISTORIE.length-1);
  const y=v=>H-P.b-(H-P.t-P.b)*v/maxY;
  let svg="";
  const stap=Math.max(10,Math.ceil(maxY/5/10)*10);
  for(let v=0;v<=maxY;v+=stap){
    svg+=`<line x1="${P.l}" y1="${y(v)}" x2="${W-P.r}" y2="${y(v)}" stroke="#e2e7f0"/>`+
         `<text x="${P.l-6}" y="${y(v)+4}" font-size="10" fill="#777" text-anchor="end">${v}</text>`;
  }
  const dat=i=>HISTORIE[i].datum.slice(5).split("-").reverse().join("/");
  [0,Math.floor((HISTORIE.length-1)/2),HISTORIE.length-1].filter((v,i,a)=>a.indexOf(v)===i).forEach(i=>{
    svg+=`<text x="${x(i)}" y="${H-10}" font-size="10" fill="#777" text-anchor="middle">${dat(i)}</text>`;
  });
  const kleur={}; DEELNEMERS.forEach((n,i)=>kleur[n]=LIJN_KLEUREN[i%LIJN_KLEUREN.length]);
  DEELNEMERS.forEach(n=>{
    const pts=HISTORIE.map((s,i)=>`${x(i).toFixed(1)},${y(s.stand[n]??0).toFixed(1)}`).join(" ");
    svg+=`<polyline fill="none" stroke="${kleur[n]}" stroke-width="2" points="${pts}"/>`;
  });
  const laatste=HISTORIE[HISTORIE.length-1].stand||{};
  [...DEELNEMERS].sort((a,b)=>(laatste[b]??0)-(laatste[a]??0)).forEach((n,i)=>{
    const ly=P.t+10+i*19;
    svg+=`<rect x="${W-P.r+10}" y="${ly-8}" width="10" height="10" fill="${kleur[n]}"/>`+
         `<text x="${W-P.r+25}" y="${ly+1}" font-size="11" fill="#333">${n} (${laatste[n]??0})</text>`;
  });
  return `<div style="padding:14px 14px 24px"><div class="hdr-blue" style="margin-bottom:6px">Standverloop</div>`+
         `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">${svg}</svg></div>`;
}

// ---------- TABS ----------
function renderTabs(){
  const tabs=document.getElementById("tabs");tabs.innerHTML="";
  const all=["Stand","Stats",...DEELNEMERS,"All Time"];
  all.forEach(name=>{
    const b=document.createElement("button");
    b.textContent=name;b.className=name===CURRENT?"active":"";
    b.onclick=()=>{CURRENT=name;draw();};
    tabs.append(b);
  });
}
function draw(){
  renderTabs();
  document.getElementById("namestrip").textContent =
    CURRENT==="Stand" ? "Stand" :
    CURRENT==="Stats" ? "Statistieken" :
    CURRENT==="All Time" ? "All Time Tempetoto Ranking" :
    "Voorspellingen — "+CURRENT;
  if(CURRENT==="Stand"){
    renderGrid(standRows(),STAND_OPTS);
    document.getElementById("sheet").insertAdjacentHTML("beforeend",chartHTML());
  }
  else if(CURRENT==="Stats") renderGrid(statsRows());
  else if(CURRENT==="All Time") renderGrid(alltimeRows(),{ncols:12,widths:[34,36,28,60,60,62,62,62,62,62,62,62,65]});
  else renderGrid(participantRows(CURRENT));
  document.querySelector(".sheetwrap").scrollTop=0;
}
draw();
</script>
